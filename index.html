<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凯 - 个人导航</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #FAFAFA;
  --fg: #0F172A;
  --muted: #F1F5F9;
  --muted-fg: #64748B;
  --accent: #0052FF;
  --accent-2: #4D7CFF;
  --accent-fg: #FFFFFF;
  --border: #E2E8F0;
  --card: #FFFFFF;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.08);
  --shadow-accent: 0 4px 14px rgba(0,82,255,0.25);
  --danger: #EF4444;
}

html { scroll-behavior: smooth; }

body {
  font-family: "Inter", "Noto Sans SC", "PingFang SC", "Microsoft YaHei UI", sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -200px;
  right: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(0,82,255,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: -200px;
  left: -200px;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(77,124,255,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
  position: relative;
  z-index: 1;
}

/* ===== Header ===== */
header {
  padding: 48px 0 0;
  text-align: center;
  animation: fadeInDown 0.7s ease-out;
  position: relative;
}

header .logo {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

header .logo-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 700;
  font-size: 20px;
  box-shadow: var(--shadow-accent);
}

header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--fg);
}


/* ===== Settings Button ===== */
.settings-btn {
  position: fixed;
  top: 20px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted-fg);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-sm);
  transition: all 0.25s ease-out;
  z-index: 100;
}

.settings-btn:hover {
  color: var(--accent);
  border-color: var(--accent);
  box-shadow: var(--shadow-md);
  transform: rotate(30deg);
}

/* ===== Search ===== */
.search-section {
  margin: 36px auto 0;
  max-width: 620px;
  animation: fadeInUp 0.7s ease-out 0.1s both;
}

.search-box {
  display: flex;
  align-items: center;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 6px 6px 6px 20px;
  box-shadow: var(--shadow-md);
  transition: all 0.25s ease-out;
}

.search-box:focus-within {
  border-color: var(--accent);
  box-shadow: var(--shadow-accent), var(--shadow-md);
}

.search-box input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 15px;
  font-family: inherit;
  color: var(--fg);
  background: transparent;
  height: 44px;
}

.search-box input::placeholder {
  color: var(--muted-fg);
}

.search-box button {
  height: 44px;
  padding: 0 28px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: var(--accent-fg);
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease-out;
  white-space: nowrap;
}

.search-box button:hover {
  box-shadow: var(--shadow-accent);
  transform: translateY(-1px);
}

.search-box button:active {
  transform: translateY(0) scale(0.98);
}

.search-engines {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 12px;
}

.search-engines label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  color: var(--muted-fg);
  cursor: pointer;
  transition: color 0.2s;
}

.search-engines label:hover { color: var(--fg); }

.search-engines input[type="radio"] {
  accent-color: var(--accent);
}

/* ===== Time & Date ===== */
.time-bar {
  text-align: center;
  margin-top: 32px;
  animation: fadeInUp 0.7s ease-out 0.15s both;
}

.time-bar .time {
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -2px;
  color: var(--fg);
  line-height: 1;
}

.time-bar .date {
  font-size: 14px;
  color: var(--muted-fg);
  margin-top: 4px;
}

/* ===== Nav Sections ===== */
.nav-sections {
  margin-top: 40px;
  padding-bottom: 60px;
}

.nav-group {
  margin-bottom: 32px;
  animation: fadeInUp 0.7s ease-out both;
}

.nav-group:nth-child(1) { animation-delay: 0.2s; }
.nav-group:nth-child(2) { animation-delay: 0.3s; }
.nav-group:nth-child(3) { animation-delay: 0.4s; }
.nav-group:nth-child(4) { animation-delay: 0.5s; }
.nav-group:nth-child(5) { animation-delay: 0.6s; }
.nav-group:nth-child(n+6) { animation-delay: 0.7s; }

.nav-group-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted-fg);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
  padding-left: 2px;
}

.nav-group-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.nav-group-title .cat-actions {
  display: none;
  gap: 4px;
  margin-left: 4px;
  flex-shrink: 0;
}

body.edit-mode .nav-group-title .cat-actions {
  display: flex;
}

.nav-group-title .cat-actions button {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--muted-fg);
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: all 0.15s;
}

.nav-group-title .cat-actions button:hover {
  color: var(--accent);
  border-color: var(--accent);
}

.nav-group-title .cat-actions .cat-del-btn:hover {
  color: var(--danger);
  border-color: var(--danger);
}


.add-category-btn {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 12px;
  margin-bottom: 24px;
  border: 2px dashed var(--border);
  border-radius: 12px;
  background: transparent;
  color: var(--muted-fg);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease-out;
  font-family: inherit;
}

body.edit-mode .add-category-btn {
  display: flex;
}

.add-category-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,82,255,0.03);
}

.nav-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.nav-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  text-decoration: none;
  color: var(--fg);
  transition: all 0.25s ease-out;
  box-shadow: var(--shadow-sm);
  position: relative;
  width: auto;
  min-width: 150px;
  flex: 0 0 auto;
}

.nav-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.nav-card:active {
  transform: translateY(0) scale(0.98);
}

.nav-card .icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  overflow: hidden;
}

.nav-card .icon img {
  width: 24px;
  height: 24px;
  object-fit: contain;
}

.nav-card .info {
  overflow: hidden;
}

.nav-card .info .name {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
}

.nav-card .info .desc {
  font-size: 11px;
  color: var(--muted-fg);
  white-space: nowrap;
  margin-top: 1px;
}

.nav-card .card-actions {
  position: absolute;
  top: -6px;
  right: -6px;
  display: none;
  gap: 4px;
  z-index: 2;
}

body.edit-mode .nav-card .card-actions {
  display: flex;
}

.nav-card .card-actions button {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  color: white;
  border: 2px solid var(--card);
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transition: transform 0.15s;
  padding: 0;
}

.nav-card .card-actions button:hover {
  transform: scale(1.15);
}

.nav-card .card-actions .edit-btn {
  background: var(--accent);
}

.nav-card .card-actions .delete-btn {
  background: var(--danger);
}

/* ===== Add Card ===== */
.add-card {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 16px;
  background: transparent;
  border: 2px dashed var(--border);
  border-radius: 12px;
  color: var(--muted-fg);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s ease-out;
  font-family: inherit;
}

.add-card:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,82,255,0.03);
}

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,0.5);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease-out;
}

.modal-overlay.active {
  display: flex;
}

.modal {
  background: var(--card);
  border-radius: 20px;
  padding: 32px;
  width: 90%;
  max-width: 460px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.15);
  animation: modalIn 0.3s ease-out;
}

.modal h2 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 24px;
  color: var(--fg);
}

.modal .form-group {
  margin-bottom: 18px;
}

.modal label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted-fg);
  margin-bottom: 6px;
}

.modal input, .modal select {
  width: 100%;
  height: 44px;
  padding: 0 14px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  color: var(--fg);
  background: var(--bg);
  outline: none;
  transition: border-color 0.2s;
}

.modal input:focus, .modal select:focus {
  border-color: var(--accent);
}

.modal input::placeholder {
  color: var(--muted-fg);
}

.modal .logo-preview {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
  padding: 10px 14px;
  background: var(--muted);
  border-radius: 10px;
  min-height: 48px;
}

.modal .logo-preview img {
  width: 28px;
  height: 28px;
  object-fit: contain;
  border-radius: 4px;
}

.modal .logo-preview span {
  font-size: 13px;
  color: var(--muted-fg);
}

.modal .logo-preview .loading {
  font-size: 13px;
  color: var(--accent);
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}

.modal-actions button {
  flex: 1;
  height: 44px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
}

.btn-cancel {
  background: var(--muted);
  color: var(--fg);
}

.btn-cancel:hover {
  background: var(--border);
}

.btn-save {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: var(--accent-fg);
}

.btn-save:hover {
  box-shadow: var(--shadow-accent);
  transform: translateY(-1px);
}

.btn-save:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* ===== Footer ===== */
footer {
  text-align: center;
  padding: 24px 0 40px;
  color: var(--muted-fg);
  font-size: 12px;
  position: relative;
  z-index: 1;
}

/* ===== Animations ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* ===== Responsive ===== */
@media (max-width: 640px) {
  header { padding-top: 32px; }
  header h1 { font-size: 22px; }
  .time-bar .time { font-size: 36px; }
  .nav-card { padding: 10px 12px; min-width: 120px; }
  .nav-card .icon { width: 32px; height: 32px; font-size: 16px; }
  .nav-card .icon img { width: 20px; height: 20px; }
  .search-box button { padding: 0 18px; }
  .settings-btn { top: 12px; right: 12px; width: 38px; height: 38px; font-size: 18px; }
  .modal { padding: 24px; margin: 16px; }
}
</style>
</head>
<body>

<button class="settings-btn" id="settingsBtn" title="设置">⚙️</button>
<button class="settings-btn" id="adminBtn" title="管理员配置" style="right:76px;font-size:16px;display:none;">🔑</button>
<button class="settings-btn" id="calcBtn" title="计算器" style="right:128px;">🧮</button>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">凯</div>
      <h1>凯</h1>
    </div>

  </header>

  <section class="search-section">
    <form class="search-box" id="searchForm" action="https://www.baidu.com/s" method="get" target="_blank">
      <input type="text" name="wd" id="searchInput" placeholder="搜索你想要的内容..." autocomplete="off">
      <button type="submit">搜 索</button>
    </form>
    <div class="search-engines">
      <label><input type="radio" name="engine" value="baidu" checked onchange="switchEngine(this.value)"> 百度</label>
      <label><input type="radio" name="engine" value="google" onchange="switchEngine(this.value)"> Google</label>
      <label><input type="radio" name="engine" value="bing" onchange="switchEngine(this.value)"> Bing</label>
    </div>
  </section>

  <div class="time-bar">
    <div class="time" id="clock">00:00</div>
    <div class="date" id="dateStr"></div>
  </div>

  <div class="nav-sections" id="navSections"></div>
</div>

<footer>
  <p>© 2026 凯 · 个人导航站</p>
</footer>

<!-- Add Site Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>添加网站</h2>
    <div class="form-group">
      <label>网站地址</label>
      <input type="url" id="siteUrl" placeholder="https://example.com" oninput="onUrlInput()">
    </div>
    <div class="form-group">
      <label>网站名称</label>
      <input type="text" id="siteName" placeholder="自动获取，也可手动输入">
    </div>
    <div class="form-group">
      <label>网站描述</label>
      <input type="text" id="siteDesc" placeholder="简短描述（可选）">
    </div>
    <div class="form-group">
      <label>所属分类</label>
      <select id="siteCategory"></select>
    </div>
    <div class="form-group">
      <label>网站图标</label>
      <div class="logo-preview" id="logoPreview">
        <span>输入网址后自动获取</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" id="saveBtn" onclick="saveSite()">添加</button>
    </div>
  </div>
</div>

<!-- Category Modal -->
<div class="modal-overlay" id="catModalOverlay">
  <div class="modal">
    <h2 id="catModalTitle">新建分类</h2>
    <div class="form-group">
      <label>分类名称</label>
      <input type="text" id="catNameInput" placeholder="请输入分类名称">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCatModal()">取消</button>
      <button class="btn-save" id="catSaveBtn" onclick="saveCatModal()">确定</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmOverlay">
  <div class="modal" style="max-width:380px;">
    <h2 id="confirmTitle">确认</h2>
    <p id="confirmMsg" style="color:var(--muted-fg);font-size:14px;line-height:1.6;margin-bottom:24px;"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeConfirm(false)">取消</button>
      <button class="btn-save" style="background:var(--danger);" onclick="closeConfirm(true)">确定</button>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div class="modal-overlay" id="adminOverlay">
  <div class="modal" style="max-width:460px;">
    <h2 id="adminModalTitle">🔑 管理员配置</h2>
    <div class="form-group" id="adminPwdGroup" style="display:none;">
      <label>管理员密码</label>
      <input type="password" id="adminPwdInput" placeholder="输入管理员密码">
    </div>
    <div class="form-group" id="adminNewPwdGroup" style="display:none;">
      <label>新密码</label>
      <input type="password" id="adminNewPwdInput" placeholder="设置管理员密码">
      <div style="font-size:12px;color:var(--muted-fg);margin-top:6px;">进入编辑模式需要此密码</div>
    </div>
    <div class="form-group" id="adminTokenGroup" style="display:none;">
      <label>GitHub Token</label>
      <input type="password" id="adminTokenInput" placeholder="ghp_xxxxxxxxxxxx">
      <div style="font-size:12px;color:var(--muted-fg);margin-top:6px;line-height:1.5;">
        前往 <a href="https://github.com/settings/tokens/new" target="_blank" style="color:var(--accent);">GitHub 创建 Token</a>，勾选 <b>repo</b> 权限
      </div>
    </div>
    <div class="form-group" id="adminRepoGroup" style="display:none;">
      <label>仓库信息</label>
      <input type="text" id="repoInfoInput" placeholder="用户名/仓库名，如 kai1578/-">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAdminModal()">取消</button>
      <button class="btn-save" id="adminSaveBtn" onclick="adminModalAction()">确定</button>
    </div>
    <div id="otaUpgradeGroup" style="display:none;margin-top:16px;">
      <input type="file" id="otaFileInput" accept=".html" style="display:none;" onchange="onOtaFileSelect(this)">
      <button class="btn-save" style="width:100%;height:44px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:none;background:linear-gradient(135deg,#10B981,#059669);color:white;" onclick="$('otaFileInput').click()">📁 选择文件升级</button>
      <div style="text-align:center;margin-top:8px;font-size:12px;color:var(--muted-fg);">当前版本: <span id="otaCurVer"></span> <span id="otaNewVer"></span></div>
    </div>
  </div>
</div>

<!-- Calculator Modal -->
<div class="modal-overlay" id="calcOverlay">
  <div class="modal" style="max-width:320px;padding:24px;">
    <h2>🧮 计算器</h2>
    <input type="text" id="calcDisplay" readonly style="width:100%;height:56px;font-size:28px;text-align:right;padding:0 14px;border:1.5px solid var(--border);border-radius:12px;background:var(--muted);color:var(--fg);font-family:inherit;margin-bottom:16px;outline:none;">
    <div id="calcGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;"></div>
  </div>
</div>

<script>
var D = { categories: [], sites: [], categoryOrder: [] };
var edit = false, logoUrl = '', urlTimer = null, editIdx = -1;
var token = localStorage.getItem('kai_token') || '';
var repo = localStorage.getItem('kai_repo') || '';
var sha = '', pushTimer = null;
var pwdHash = localStorage.getItem('kai_pwd') || '';
var adminMode = '';
var VER = '1.0.0';


function hash(s) { var h = 0; for (var i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0; return 'h' + Math.abs(h).toString(36); }
function $(id) { return document.getElementById(id); }
function favicon(u) { try { return 'https://www.google.com/s2/favicons?domain=' + new URL(u).hostname + '&sz=64'; } catch { return ''; } }
function domain(u) { try { return new URL(u).hostname; } catch { return ''; } }
function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function push() {
  if (!token || !repo) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(function() {
    fetch('https://api.github.com/repos/' + repo + '/contents/data.json', {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: '更新导航', content: btoa(unescape(encodeURIComponent(JSON.stringify(D, null, 2)))), sha: sha })
    }).then(function(r) { return r.json(); }).then(function(r) { if (r.content && r.content.sha) sha = r.content.sha; });
  }, 2000);
}

function render() {
  var c = $('navSections'); c.innerHTML = '';
  var cats = D.categories || [], co = D.categoryOrder || [];
  var used = [];
  D.sites.forEach(function(s) { if (cats.indexOf(s.category) !== -1 && used.indexOf(s.category) === -1) used.push(s.category); });
  used.sort(function(a, b) { var ai = co.indexOf(a), bi = co.indexOf(b); if (ai < 0 && bi < 0) return 0; if (ai < 0) return 1; if (bi < 0) return -1; return ai - bi; });

  used.forEach(function(cat) {
    var sites = D.sites.filter(function(s) { return s.category === cat; });
    var g = document.createElement('div'); g.className = 'nav-group';
    var t = document.createElement('div'); t.className = 'nav-group-title';
    t.appendChild(document.createTextNode(cat));

    var acts = document.createElement('div'); acts.className = 'cat-actions';
    [['↑','上移',function(e){e.stopPropagation();moveCat(cat,-1);}],
     ['↓','下移',function(e){e.stopPropagation();moveCat(cat,1);}],
     ['✎','重命名',function(e){e.stopPropagation();renameCat(cat);}],
     ['×','删除',function(e){e.stopPropagation();delCat(cat);}]].forEach(function(b) {
      var btn = document.createElement('button'); btn.className = b[2].toString().indexOf('delCat') > -1 ? 'cat-del-btn' : 'cat-edit-btn';
      btn.textContent = b[0]; btn.title = b[1]; btn.onclick = b[2]; acts.appendChild(btn);
    });
    t.appendChild(acts); g.appendChild(t);

    var grid = document.createElement('div'); grid.className = 'nav-grid';
    sites.forEach(function(site) {
      var idx = D.sites.indexOf(site);
      var card = document.createElement('a'); card.className = 'nav-card'; card.href = site.url; card.target = '_blank'; card.draggable = false;
      card.onclick = function(e) { if (edit) { e.preventDefault(); editSite(idx); } };

      var icon = document.createElement('div'); icon.className = 'icon';
      if (site.favicon) {
        icon.style.background = '#F1F5F9';
        var img = document.createElement('img'); img.src = site.favicon; img.alt = site.name;
        img.onerror = function() { this.parentElement.innerHTML = '<span style="font-size:18px">🔗</span>'; };
        icon.appendChild(img);
      } else { icon.style.background = site.emojiBg || '#F1F5F9'; icon.style.color = site.emojiColor || '#0052FF'; icon.textContent = site.emoji || '🔗'; }
      card.appendChild(icon);

      var info = document.createElement('div'); info.className = 'info';
      info.innerHTML = '<div class="name">' + esc(site.name) + '</div><div class="desc">' + esc(site.desc || '') + '</div>';
      card.appendChild(info);

      var acts2 = document.createElement('div'); acts2.className = 'card-actions';
      [['✎','edit-btn','编辑',function(e){e.preventDefault();e.stopPropagation();editSite(idx);}],
       ['×','delete-btn','删除',function(e){e.preventDefault();e.stopPropagation();delSite(idx);}]].forEach(function(b) {
        var btn = document.createElement('button'); btn.className = b[1]; btn.textContent = b[0]; btn.title = b[2]; btn.onclick = b[3]; acts2.appendChild(btn);
      });
      card.appendChild(acts2); grid.appendChild(card);
    });

    var add = document.createElement('button'); add.className = 'add-card'; add.textContent = '+ 添加网站'; add.onclick = function() { addSite(cat); };
    grid.appendChild(add); g.appendChild(grid); c.appendChild(g);
  });

  var ac = document.createElement('button'); ac.className = 'add-category-btn'; ac.textContent = '+ 新建分类'; ac.onclick = addCat; c.appendChild(ac);
  if (edit) { var ab = document.createElement('button'); ab.className = 'add-category-btn'; ab.textContent = '🔑 管理员配置'; ab.onclick = function() { openAdmin('config'); }; c.appendChild(ab); }
}

var catCb = null, cfCb = null;

function moveCat(name, dir) {
  var co = D.categoryOrder || [];
  if (!co.length) { D.categories.forEach(function(c) { if (co.indexOf(c) === -1) co.push(c); }); D.categoryOrder = co; }
  var i = co.indexOf(name); if (i < 0) return; var ni = i + dir; if (ni < 0 || ni >= co.length) return;
  co.splice(i, 1); co.splice(ni, 0, name); push(); render();
}

function addCat() {
  $('catModalTitle').textContent = '新建分类'; $('catNameInput').value = ''; $('catNameInput').placeholder = '请输入分类名称';
  catCb = function(n) { if (D.categories.includes(n)) { toast('该分类已存在'); return; } D.categories.push(n); push(); render(); };
  $('catModalOverlay').classList.add('active'); setTimeout(function() { $('catNameInput').focus(); }, 100);
}

function renameCat(old) {
  $('catModalTitle').textContent = '重命名分类'; $('catNameInput').value = old; $('catNameInput').placeholder = '请输入新的分类名称';
  catCb = function(n) { if (n === old) return; if (D.categories.includes(n)) { toast('该分类已存在'); return; }
    var i = D.categories.indexOf(old); if (i !== -1) D.categories[i] = n;
    D.sites.forEach(function(s) { if (s.category === old) s.category = n; });
    var co = D.categoryOrder || [], oi = co.indexOf(old); if (oi !== -1) co[oi] = n;
    push(); render();
  };
  $('catModalOverlay').classList.add('active'); setTimeout(function() { var inp = $('catNameInput'); inp.focus(); inp.select(); }, 100);
}

function delCat(name) {
  var cnt = D.sites.filter(function(s) { return s.category === name; }).length;
  confirm('删除分类', cnt ? '分类「' + name + '」下有 ' + cnt + ' 个网站，确定删除？' : '确定删除分类「' + name + '」？', function(ok) {
    if (!ok) return; D.sites = D.sites.filter(function(s) { return s.category !== name; });
    D.categories = D.categories.filter(function(c) { return c !== name; });
    D.categoryOrder = (D.categoryOrder || []).filter(function(c) { return c !== name; }); push(); render();
  });
}

function saveCatModal() { var n = $('catNameInput').value.trim(); if (!n) return; if (catCb) catCb(n); closeCatModal(); }
function closeCatModal() { $('catModalOverlay').classList.remove('active'); catCb = null; }

function confirm(title, msg, cb) { $('confirmTitle').textContent = title; $('confirmMsg').textContent = msg; cfCb = cb; $('confirmOverlay').classList.add('active'); }
function closeConfirm(r) { $('confirmOverlay').classList.remove('active'); if (cfCb) cfCb(r); cfCb = null; }

function toast(msg) {
  var t = $('toast'); if (!t) { t = document.createElement('div'); t.id = 'toast'; t.style.cssText = 'position:fixed;top:24px;left:50%;transform:translateX(-50%);background:var(--fg);color:var(--accent-fg);padding:10px 24px;border-radius:10px;font-size:14px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;'; document.body.appendChild(t); }
  t.textContent = msg; t.style.opacity = '1'; setTimeout(function() { t.style.opacity = '0'; }, 2000);
}

function fillCats(sel) {
  var s = $('siteCategory'); s.innerHTML = '';
  D.categories.forEach(function(c) { var o = document.createElement('option'); o.value = c; o.textContent = c; if (c === (sel || D.categories[0])) o.selected = true; s.appendChild(o); });
  var o = document.createElement('option'); o.value = '__new__'; o.textContent = '➕ 新建分类...'; s.appendChild(o);
  s.onchange = function() { if (this.value === '__new__') { this.value = sel || D.categories[0]; addCat(); } };
}

function addSite(cat) {
  editIdx = -1; $('modalOverlay').querySelector('h2').textContent = '添加网站';
  $('siteUrl').value = ''; $('siteName').value = ''; $('siteDesc').value = ''; $('siteUrl').disabled = false;
  $('logoPreview').innerHTML = '<span>输入网址后自动获取</span>'; logoUrl = ''; fillCats(cat);
  $('modalOverlay').classList.add('active'); $('saveBtn').disabled = false; $('saveBtn').textContent = '添加';
  setTimeout(function() { $('siteUrl').focus(); }, 100);
}

function editSite(idx) {
  editIdx = idx; var s = D.sites[idx];
  $('modalOverlay').querySelector('h2').textContent = '编辑网站';
  $('siteUrl').value = s.url; $('siteUrl').disabled = true; $('siteName').value = s.name; $('siteDesc').value = s.desc || '';
  logoUrl = s.favicon || favicon(s.url); fillCats(s.category);
  var p = $('logoPreview');
  if (logoUrl) { p.innerHTML = ''; var img = document.createElement('img'); img.src = logoUrl; img.alt = '图标'; p.appendChild(img); var sp = document.createElement('span'); sp.textContent = domain(s.url) + ' 的图标'; p.appendChild(sp); }
  else p.innerHTML = '<span>无图标</span>';
  $('modalOverlay').classList.add('active'); $('saveBtn').disabled = false; $('saveBtn').textContent = '保存';
}

function closeModal() { $('modalOverlay').classList.remove('active'); $('siteUrl').disabled = false; editIdx = -1; }

function onUrlInput() {
  clearTimeout(urlTimer); var url = $('siteUrl').value.trim();
  if (!url) { $('logoPreview').innerHTML = '<span>输入网址后自动获取</span>'; logoUrl = ''; return; }
  $('logoPreview').innerHTML = '<span class="loading">正在获取图标...</span>';
  urlTimer = setTimeout(function() {
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    $('siteUrl').value = url; var f = favicon(url); logoUrl = f; var d = domain(url);
    if (!$('siteName').value) $('siteName').value = d;
    var p = $('logoPreview');
    if (f) { p.innerHTML = ''; var img = document.createElement('img'); img.src = f; img.alt = '图标'; img.onerror = function() { p.innerHTML = '<span>图标获取失败</span>'; logoUrl = ''; }; p.appendChild(img); var sp = document.createElement('span'); sp.textContent = d + ' 的图标'; p.appendChild(sp); }
    else p.innerHTML = '<span>无法获取图标</span>';
  }, 500);
}

function saveSite() {
  var url = $('siteUrl').value.trim(), name = $('siteName').value.trim(), desc = $('siteDesc').value.trim(), cat = $('siteCategory').value;
  if (!url) { alert('请输入网站地址'); return; } if (!name) { alert('请输入网站名称'); return; }
  if (editIdx >= 0) { D.sites[editIdx].name = name; D.sites[editIdx].desc = desc; D.sites[editIdx].category = cat; if (logoUrl) D.sites[editIdx].favicon = logoUrl; }
  else { if (D.sites.some(function(s) { return s.url === url; })) { alert('该网站已存在'); return; } D.sites.push({ name: name, url: url, desc: desc || '', category: cat, favicon: logoUrl || '' }); }
  closeModal(); push(); render();
}

function delSite(idx) { confirm('删除网站', '确定删除「' + D.sites[idx].name + '」？', function(ok) { if (!ok) return; D.sites.splice(idx, 1); push(); render(); }); }

function openAdmin(mode) {
  adminMode = mode;
  ['adminPwdGroup','adminNewPwdGroup','adminTokenGroup','adminRepoGroup','otaUpgradeGroup'].forEach(function(id) { $(id).style.display = 'none'; });
  if (mode === 'login') {
    $('adminModalTitle').textContent = '🔒 验证密码'; $('adminPwdGroup').style.display = 'block'; $('adminPwdInput').value = ''; $('adminPwdInput').placeholder = '请输入管理员密码';
  } else {
    $('adminModalTitle').textContent = '🔑 管理员配置';
    $('adminNewPwdGroup').style.display = 'block'; $('adminNewPwdInput').value = ''; $('adminNewPwdInput').placeholder = pwdHash ? '修改密码（留空不修改）' : '设置管理员密码';
    $('adminTokenGroup').style.display = 'block'; $('adminTokenInput').value = token;
    $('adminRepoGroup').style.display = 'block'; $('repoInfoInput').value = repo;
    $('otaUpgradeGroup').style.display = 'block'; $('otaCurVer').textContent = 'v' + VER; $('otaNewVer').textContent = '';
  }
  $('adminOverlay').classList.add('active'); $('adminSaveBtn').textContent = mode === 'login' ? '验证' : '保存';
  setTimeout(function() { (mode === 'login' ? $('adminPwdInput') : $('adminNewPwdInput')).focus(); }, 100);
}

function closeAdminModal() { $('adminOverlay').classList.remove('active'); adminMode = ''; }

function adminModalAction() {
  if (adminMode === 'login') {
    if (hash($('adminPwdInput').value) === pwdHash) { closeAdminModal(); enterEdit(); } else { toast('密码错误'); }
  } else {
    var np = $('adminNewPwdInput').value;
    if (np) { pwdHash = hash(np); localStorage.setItem('kai_pwd', pwdHash); }
    token = $('adminTokenInput').value.trim(); repo = $('repoInfoInput').value.trim();
    localStorage.setItem('kai_token', token); localStorage.setItem('kai_repo', repo);
    toast('配置已保存'); closeAdminModal();
  }
}

function onOtaFileSelect(input) {
  var file = input.files[0]; if (!file) return;
  var m = file.name.match(/(\d+\.\d+\.\d+)/);
  if (m) $('otaNewVer').textContent = '→ v' + m[1]; else $('otaNewVer').textContent = '→ ' + file.name;
  confirm('文件升级', '将上传「' + file.name + '」替换仓库中的 index.html，确定？', function(ok) {
    if (!ok) { input.value = ''; return; }
    if (!token || !repo) { toast('请先配置 GitHub Token 和仓库信息'); input.value = ''; return; }
    var reader = new FileReader();
    reader.onload = function(e) {
      var html = e.target.result;
      toast('正在推送更新...');
      fetch('https://api.github.com/repos/' + repo + '/contents/index.html', {
        headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
      }).then(function(r) { return r.json(); }).then(function(info) {
        var ver = (html.match(/var VER\s*=\s*'([^']+)'/) || [,'?'])[1];
        fetch('https://api.github.com/repos/' + repo + '/contents/index.html', {
          method: 'PUT',
          headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'OTA 升级到 v' + ver, content: btoa(unescape(encodeURIComponent(html))), sha: info.sha })
        }).then(function(r) { return r.json(); }).then(function(res) {
          if (res.content) { toast('升级成功！3秒后刷新...'); setTimeout(function() { location.reload(); }, 3000); }
          else toast('升级失败: ' + (res.message || '未知错误'));
        });
      });
    };
    reader.readAsText(file);
  });
}

function enterEdit() { edit = true; document.body.classList.add('edit-mode'); $('settingsBtn').textContent = '✓'; $('settingsBtn').title = '完成编辑'; $('adminBtn').style.display = 'flex'; render(); }

$('settingsBtn').addEventListener('click', function() {
  if (edit) { edit = false; document.body.classList.remove('edit-mode'); this.textContent = '⚙️'; this.title = '设置'; $('adminBtn').style.display = 'none'; return; }
  if (pwdHash) openAdmin('login'); else enterEdit();
});

function updateClock() {
  var n = new Date();
  $('clock').textContent = String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
  var w = ['日','一','二','三','四','五','六'];
  $('dateStr').textContent = n.getFullYear() + '年' + (n.getMonth()+1) + '月' + n.getDate() + '日 星期' + w[n.getDay()];
}
updateClock(); setInterval(updateClock, 1000);

(function() {
  var expr = '', disp = $('calcDisplay'), grid = $('calcGrid');
  var btns = ['C','±','%','÷','7','8','9','×','4','5','6','-','1','2','3','+','0','.','⌫','='];
  btns.forEach(function(t) {
    var b = document.createElement('button');
    b.textContent = t;
    b.style.cssText = 'height:48px;border-radius:10px;border:none;font-size:18px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;';
    if ('0123456789.'.indexOf(t) > -1) b.style.cssText += 'background:var(--card);color:var(--fg);';
    else if (t === '=') b.style.cssText += 'background:linear-gradient(135deg,var(--accent),var(--accent-2));color:white;';
    else b.style.cssText += 'background:var(--muted);color:var(--muted-fg);';
    b.onmouseenter = function() { this.style.opacity = '0.7'; };
    b.onmouseleave = function() { this.style.opacity = '1'; };
    b.onclick = function() {
      if (t === 'C') { expr = ''; }
      else if (t === '⌫') { expr = expr.slice(0, -1); }
      else if (t === '±') { if (expr && expr[0] === '-') expr = expr.slice(1); else if (expr) expr = '-' + expr; }
      else if (t === '%') { try { expr = String(parseFloat(expr) / 100); } catch(e) {} }
      else if (t === '=') {
        try { var e = expr.replace(/×/g,'*').replace(/÷/g,'/'); expr = String(Function('"use strict";return(' + e + ')')()); if (expr === 'Infinity' || expr === 'NaN') expr = 'Error'; } catch(e) { expr = 'Error'; }
      }
      else { if (expr === 'Error') expr = ''; expr += t; }
      disp.value = expr || '0';
    };
    grid.appendChild(b);
  });
  $('calcBtn').addEventListener('click', function() { $('calcOverlay').classList.add('active'); disp.value = expr || '0'; });
  $('calcOverlay').addEventListener('click', function(e) { if (e.target === this) $('calcOverlay').classList.remove('active'); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && $('calcOverlay').classList.contains('active')) $('calcOverlay').classList.remove('active'); });
